name: LLM AgentGuard DevSecOps Scan

on:
  # ── Trigger on code push (diff-scoped) ───────────────────────────────────
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '.github/workflows/security_scan.yml'
      - 'requirements.txt'

  # ── Trigger on Pull Requests (diff-scoped) ────────────────────────────────
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
      - '.github/workflows/security_scan.yml'
      - 'requirements.txt'

  # ── Continuous Pentesting: Auto-scan every night at 2:00 AM UTC ───────────
  # Runs even when no PRs or commits are pending — always-on security monitoring
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 9:00 AM ICT (Vietnam timezone)

  # ── Manual trigger from the GitHub Actions tab ────────────────────────────
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Select scan mode'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - deep

permissions:
  contents: read
  pull-requests: write   # Required for the bot to comment results on PRs
  id-token: write        # Required for OIDC-based authentication with GCP

jobs:
  agentguard-security-scan:
    name: Run LLM Red Teaming & Judge
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff-scope to work correctly

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Keyless GCP authentication via OIDC (Workload Identity Federation)
      # No JSON keys stored — token is issued per-run with 1-hour TTL
      - name: 🔐 Configure GCP Credentials via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: 🚀 Start Mock Target API (Background)
        run: |
          echo "Starting local Target API..."
          PYTHONPATH=. uvicorn src.agents.target_mock:app --host 127.0.0.1 --port 8000 &
          sleep 3   # Wait for API to fully start

      - name: 🛡️ Execute AgentGuard Red Teaming
        env:
          # API Key injected securely from GitHub Secrets — NEVER hardcoded
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Use input from workflow_dispatch; fallback to 'quick' for cron/push/PR triggers
          AGENTGUARD_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'quick' }}
        run: |
          echo "🛡️ Trigger: ${{ github.event_name }}"
          echo "⚙️  Scan mode: ${AGENTGUARD_SCAN_MODE}"
          PYTHONPATH=. python src/main.py --mode ${AGENTGUARD_SCAN_MODE} > scan_report.log

      - name: 📊 Parse Results & Enforce Security Gate
        if: always()   # Always run this step regardless of pass/fail — print full logs
        run: |
          echo "=== JUDGE AGENT EVALUATION RESULTS ==="
          cat scan_report.log

      - name: 📤 Upload Security HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AgentGuard-Security-Report
          path: security_report.html

      - name: 💬 Comment on Pull Request
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let commentBody = "🛡️ AgentGuard security scan completed but no report file was found.";
            if (fs.existsSync('pr_comment.md')) {
              commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
