name: LLM AgentGuard DevSecOps Scan

on:
  # ── Trigger thủ công khi push code ───────────────────────────────────────
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '.github/workflows/security_scan.yml'
      - 'requirements.txt'

  # ── Trigger khi mở Pull Request (Diff-scope) ─────────────────────────────
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
      - '.github/workflows/security_scan.yml'
      - 'requirements.txt'

  # ── Continuous Pentesting: Tự động quét mỗi đêm lúc 2:00 AM UTC ─────────
  # Ngay cả khi không có PR hay commit nào, hệ thống vẫn tự kiểm tra
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 9:00 AM ICT (múi giờ Việt Nam)

  # ── Cho phép kích hoạt thủ công từ tab Actions trên GitHub ───────────────
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Chọn chế độ scan'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - deep

permissions:
  contents: read
  pull-requests: write # Cấp quyền để bot có thể comment kết quả test lên PR
  id-token: write      # Bắt buộc nếu bạn dùng OIDC để xác thực với AWS/GCP

jobs:
  agentguard-security-scan:
    name: Run LLM Red Teaming & Judge
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Cần full history để diff-scope hoạt động đúng

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Tùy chọn: Đăng nhập Cloud không cần mật khẩu qua OIDC (Best Practice cho DevSecOps)
      # - name: Configure GCP Credentials via OIDC (Workload Identity Federation)
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
      #     service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: 🚀 Start Mock Target API (Background)
        run: |
          echo "Khởi động Target API cục bộ..."
          PYTHONPATH=. uvicorn src.agents.target_mock:app --host 127.0.0.1 --port 8000 &
          sleep 3 # Đợi API khởi động hoàn tất

      - name: 🛡️ Execute AgentGuard Red Teaming
        env:
          # Truyền API Key an toàn từ GitHub Secrets — KHÔNG BAO GIỜ hardcode
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Nếu trigger từ workflow_dispatch thì dùng input của người dùng chọn
          # Nếu trigger từ cron/push/PR thì dùng "quick" mặc định
          AGENTGUARD_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'quick' }}
        run: |
          echo "🛡️ Trigger: ${{ github.event_name }}"
          echo "⚙️  Scan mode: ${AGENTGUARD_SCAN_MODE}"
          PYTHONPATH=. python src/main.py --mode ${AGENTGUARD_SCAN_MODE} > scan_report.log

      - name: 📊 Parse Results & Enforce Security Gate
        if: always() # Luôn chạy bước này dù test pass hay fail để in log
        run: |
          echo "=== KẾT QUẢ ĐÁNH GIÁ TỪ JUDGE AGENT ==="
          cat scan_report.log

      - name: 📤 Upload Security HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AgentGuard-Security-Report
          path: security_report.html

      - name: 💬 Comment on Pull Request
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let commentBody = "🛡️ AgentGuard đã chạy quét bảo mật nhưng không tìm thấy file báo cáo.";
            if (fs.existsSync('pr_comment.md')) {
              commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
